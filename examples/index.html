<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VQ-Sort vs Repository QuickSort</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #121214;
            color: #e4e4e7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #3b82f6;
            margin-bottom: 5px;
        }

        .controls {
            margin: 15px 0;
            display: flex;
            gap: 15px;
            align-items: center;
            background: #18181b;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #27272a;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        label {
            font-size: 14px;
            color: #a1a1aa;
        }

        select,
        input {
            background: #27272a;
            color: white;
            border: 1px solid #3f3f46;
            padding: 8px;
            border-radius: 6px;
        }

        input {
            width: 80px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h3 {
            margin-bottom: 8px;
            color: #a1a1aa;
        }

        canvas {
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .metrics-bar {
            margin-top: 20px;
            font-family: monospace;
            background: #18181b;
            padding: 15px 25px;
            border-radius: 6px;
            border: 1px solid #27272a;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .metric-val {
            color: #10b981;
            font-weight: bold;
        }

        .speedup {
            color: #f59e0b;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>VQ-Sort vs QuickSort</h1>
    <p style="color: #a1a1aa; margin-top: 0;">Using the library's built-in benchmarking functions.</p>

    <div class="controls">
        <label for="dataSize">Data Size (N):</label>
        <input type="number" id="dataSize" value="3000" min="100" max="50000">

        <label for="bucketSelect">Base Buckets:</label>
        <select id="bucketSelect">
            <option value="10">10 (Highly Approximate)</option>
            <option value="50" selected>50 (Medium Accuracy)</option>
            <option value="200">200 (High Accuracy)</option>
            <option value="1000">1000 (Near Perfect)</option>
        </select>

        <button id="runBtn">Run Comparison</button>
    </div>

    <div class="container">
        <div class="panel">
            <h3>quickSort() (Exact)</h3>
            <canvas id="qsCanvas" width="500" height="350"></canvas>
        </div>
        <div class="panel">
            <h3>vqSort() (Approximate)</h3>
            <canvas id="vqCanvas" width="500" height="350"></canvas>
        </div>
    </div>

    <div class="metrics-bar">
        <div class="time" style="display: flex; gap: 10px;">
            <div>QuickSort Time: <span class="metric-val" id="qsTime">0 ms</span></div>
            <div>VQ-Sort Time: <span class="metric-val" id="vqTime">0 ms</span></div>
            <div>Speedup Factor: <span class="speedup" id="speedupVal">0x</span></div>
        </div>
        <div class="recall" style="display: flex; gap: 10px;">
            <div>VQ Macro Accuracy (F=0.3): <span class="metric-val" id="mRecall_3">0%</span></div>
            <div>VQ Macro Accuracy (F=0.5): <span class="metric-val" id="mRecall_5">0%</span></div>
        </div>
    </div>

    <script type="module">
        // Importing both sorting methods straight from the library bundle CDN
        import { vqSort, quickSort, calculateForgivingRecall } from 'https://unpkg.com/vq-sort?module';

        const qsCanvas = document.getElementById('qsCanvas');
        const vqCanvas = document.getElementById('vqCanvas');
        const runBtn = document.getElementById('runBtn');
        const bucketSelect = document.getElementById('bucketSelect');
        const dataSizeInput = document.getElementById('dataSize');

        function generateGaussianData(size) {
            const data = new Float64Array(size);
            for (let i = 0; i < size; i++) {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                let num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                num = num * 15 + 50;
                data[i] = Math.max(0, Math.min(100, num));
            }
            return data;
        }

        function drawArray(canvas, arr, colorMode, baseBuckets = 50) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padX = 30;
            const padY = 30;
            const graphWidth = canvas.width - (padX * 2);
            const graphHeight = canvas.height - (padY * 2);

            ctx.strokeStyle = '#27272a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padX, canvas.height - padY);
            ctx.lineTo(canvas.width - padX, canvas.height - padY);
            ctx.stroke();

            for (let i = 0; i < arr.length; i++) {
                const x = padX + (i / arr.length) * graphWidth;
                const y = (canvas.height - padY) - (arr[i] / 100) * graphHeight;

                if (colorMode === 'qs') {
                    ctx.fillStyle = `hsl(${200 + (i / arr.length) * 40}, 85%, 60%)`;
                } else {
                    const segment = Math.floor((i / arr.length) * baseBuckets);
                    ctx.fillStyle = segment % 2 === 0 ? '#3b82f6' : '#60a5fa';
                }

                ctx.beginPath();
                const radius = arr.length > 10000 ? 0.8 : 1.8;
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function runComparison() {
            const N = Math.max(100, parseInt(dataSizeInput.value, 10) || 3000);
            const baseBuckets = parseInt(bucketSelect.value, 10);

            const rawData = generateGaussianData(N);

            // --- 1. Benchmark Package QuickSort ---
            const tQs0 = performance.now();
            const sortedQsArray = quickSort(rawData);
            const tQs1 = performance.now();
            const qsTime = tQs1 - tQs0;
            console.log(`QuickSort Time: ${qsTime} ms`);

            // --- 2. Benchmark Package VQ-Sort (Averaged Over 10 Iterations to prevent performance.now() zeroing) ---
            const ITERATIONS = 10;
            let totalVqTime = 0;
            let sortedVqArray; // This will hold the final sorted result for rendering

            for (let i = 0; i < ITERATIONS; i++) {
                const tVq0 = performance.now();
                sortedVqArray = vqSort(rawData, baseBuckets);
                const tVq1 = performance.now();
                totalVqTime += (tVq1 - tVq0);
            }

            // Compute the true mathematical average across all runs
            const vqTime = totalVqTime / ITERATIONS;
            console.log(`VQ-Sort Time (Avg of ${ITERATIONS} runs): ${vqTime} ms`);

            // --- 3. Compute Metrics ---
            const avgBucketSize = N / baseBuckets;
            const recall_5 = calculateForgivingRecall(sortedVqArray, 0.5, avgBucketSize);
            const recall_3 = calculateForgivingRecall(sortedVqArray, 0.3, avgBucketSize);
            const speedup = qsTime / (vqTime || 0.001);

            // --- 4. Render Interfaces ---
            document.getElementById('qsTime').innerText = `${qsTime.toFixed(5)} ms`;
            document.getElementById('vqTime').innerText = `${vqTime.toFixed(5)} ms`;
            document.getElementById('speedupVal').innerText = `${speedup.toFixed(2)}x`;
            document.getElementById('mRecall_5').innerText = `${(recall_5 * 100).toFixed(1)}%`;
            document.getElementById('mRecall_3').innerText = `${(recall_3 * 100).toFixed(1)}%`;

            drawArray(qsCanvas, sortedQsArray, 'qs');
            drawArray(vqCanvas, sortedVqArray, 'vq', baseBuckets);
        }

        runBtn.addEventListener('click', runComparison);
        runComparison();
    </script>
</body>

</html>
